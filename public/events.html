<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events – BLOCK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <script>
    (function() {
      var isFile = location.protocol === 'file:';
      var isWrongPort = location.hostname === 'localhost' && location.port !== '3001' && location.port !== '';
      if (isFile || isWrongPort) {
        var base = document.createElement('base');
        base.href = 'http://localhost:3001/';
        document.head.appendChild(base);
      }
    })();
  </script>
  <style>
    :root {
      --bg: #0a0a0c;
      --card: #141418;
      --border: #25252d;
      --text: #e8e8ed;
      --muted: #8888a0;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --bar-bg: #ffffff;
      --bar-text: #1a1a1a;
      --bar-muted: #5a5a5a;
      --search-bg: #f0f0f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; width: 100%; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      background-image: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(99, 102, 241, 0.12), transparent);
    }
    .top-bar-wrap { width: 100%; padding: 1rem clamp(0.75rem, 3vw, 1.25rem) 0; margin-bottom: 1.5rem; }
    .top-bar {
      width: 100%;
      max-width: min(1400px, 96vw);
      margin: 0 auto;
      background: var(--bar-bg);
      border-radius: 16px;
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .top-bar .logo { width: 110px; height: auto; flex-shrink: 0; }
    .search-wrap { flex: 1; min-width: 180px; max-width: 360px; position: relative; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--bar-muted); }
    .search-wrap input {
      width: 100%;
      padding: 10px 12px 10px 40px;
      font: inherit;
      font-size: 0.95rem;
      color: var(--bar-text);
      background: var(--search-bg);
      border: none;
      border-radius: 12px;
    }
    .search-wrap input::placeholder { color: var(--bar-muted); }
    .search-wrap input:focus { outline: none; }
    .top-bar-nav { display: flex; align-items: center; gap: 1.25rem; flex-wrap: wrap; margin-left: auto; }
    .top-bar-nav a { color: var(--bar-text); text-decoration: none; font-size: 0.95rem; font-weight: 500; }
    .top-bar-nav a:hover { color: var(--accent); }
    .top-bar-icons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    .top-bar-icons a {
      display: flex; align-items: center; justify-content: center;
      width: clamp(36px, 9vw, 40px); height: clamp(36px, 9vw, 40px);
      min-width: 36px; min-height: 36px;
      border-radius: 10px;
      color: var(--bar-text); text-decoration: none;
    }
    .top-bar-icons a:hover { background: var(--search-bg); color: var(--accent); }
    .top-bar-icons svg { width: clamp(18px, 4.5vw, 20px); height: clamp(18px, 4.5vw, 20px); }

    .page-main {
      width: 100%;
      max-width: min(1400px, 96vw);
      margin: 0 auto;
      padding: 0 clamp(0.75rem, 3vw, 1.25rem) 3rem;
    }
    .page-main-header {
      margin-bottom: 1.5rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .page-main-header h1 { font-size: 1.6rem; }
    .page-main-header .count { color: var(--muted); font-size: 0.9rem; }
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(260px, 100%), 1fr));
      gap: 1.5rem;
    }
    .event-card {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, transform 0.2s;
    }
    .event-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .event-card img {
      width: 100%;
      max-width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: var(--border);
    }
    .event-card-body {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .event-card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.35rem; }
    .event-card-meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 0.4rem; }
    .event-card-venue { color: var(--muted); font-size: 0.85rem; margin-bottom: 1rem; }
    .event-card a.btn-register {
      margin-top: auto;
      align-self: flex-start;
      padding: 10px 18px;
      font: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      color: white;
      background: var(--accent);
      border-radius: 10px;
      text-decoration: none;
    }
    .event-card a.btn-register:hover { background: var(--accent-hover); }
    .empty-msg { text-align: center; color: var(--muted); padding: 3rem 1.25rem; }
    @media (max-width: 600px) {
      .top-bar { padding: 0.6rem 1rem; gap: 0.6rem; }
      .top-bar .logo { width: 90px; }
      .search-wrap { flex: 1 1 100%; min-width: 100%; max-width: 100%; order: 1; }
      .top-bar-nav { order: 2; flex: 1 1 100%; margin-left: 0; gap: 0.75rem; font-size: 0.85rem; }
      .top-bar-nav a { font-size: 0.85rem; white-space: nowrap; }
      .top-bar-icons { order: 0; margin-left: auto; }
      .filter-bar { flex-direction: column; align-items: stretch; }
      .filter-group select { min-width: 0; width: 100%; }
    }

    /* TicketsMarche-style filter bar */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
      margin-bottom: 2rem;
      padding: 1.25rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .filter-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
    }
    .filter-group select {
      min-width: min(160px, 100%);
      padding: 10px 12px;
      font: inherit;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .filter-group select:focus { outline: none; border-color: var(--accent); }
    .filter-group .btn-apply {
      padding: 10px 18px;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: white;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .filter-group .btn-apply:hover { background: var(--accent-hover); }

    .site-footer { margin-top: auto; padding: 2.5rem 1.25rem; border-top: 1px solid var(--border); background: linear-gradient(180deg, rgba(20,20,24,0.6), var(--card)); }
    .site-footer-inner { width: 100%; max-width: min(1400px, 96vw); margin: 0 auto; padding: 0 clamp(0.75rem, 3vw, 1.25rem); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1.75rem; }
    .site-footer-links { display: flex; flex-wrap: wrap; align-items: center; gap: 1.5rem; }
    .site-footer-links a { color: var(--muted); text-decoration: none; font-size: 0.95rem; font-weight: 500; }
    .site-footer-links a:hover { color: var(--accent); }
    .site-footer-social { display: flex; align-items: center; gap: 1rem; }
    .site-footer-instagram { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--muted); text-decoration: none; font-size: 0.95rem; font-weight: 500; padding: 0.4rem 0.75rem; border-radius: 10px; transition: color 0.2s, background 0.2s; }
    .site-footer-instagram:hover { color: var(--accent); background: rgba(99,102,241,0.08); }
    .site-footer-instagram svg { width: 20px; height: 20px; }
    .site-footer-copy { color: var(--muted); font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="top-bar-wrap">
    <header class="top-bar">
      <a href="/"><img src="/block-logo.png" alt="BLOCK" class="logo"></a>
      <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input type="search" id="searchInput" placeholder="Search for events..." aria-label="Search events">
      </div>
      <nav class="top-bar-nav">
        <a href="/events">Events</a>
        <a href="/about-us">About Us</a>
        <a href="/contact">Contact & Support</a>
      </nav>
      <div class="top-bar-icons">
        <a href="/profile" aria-label="My tickets / Profile" title="My tickets">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </a>
      </div>
    </header>
  </div>

  <main class="page-main">
    <div class="page-main-header">
      <h1>Events</h1>
      <span class="count" id="eventsCount"></span>
    </div>

    <section class="filter-bar" aria-label="Filter events">
      <div class="filter-group">
        <label for="filterDate">Select Date</label>
        <select id="filterDate" aria-label="Filter by date">
          <option value="">All Dates</option>
        </select>
        <button type="button" class="btn-apply" id="applyDate">Apply</button>
      </div>
      <div class="filter-group">
        <label for="filterVenue">Select Venue</label>
        <select id="filterVenue" aria-label="Filter by venue">
          <option value="">All Venues</option>
        </select>
        <button type="button" class="btn-apply" id="applyVenue">Apply</button>
      </div>
      <div class="filter-group">
        <label for="filterCategory">Select Category</label>
        <select id="filterCategory" aria-label="Filter by category">
          <option value="">All Categories</option>
        </select>
        <button type="button" class="btn-apply" id="applyCategory">Apply</button>
      </div>
    </section>

    <div id="eventsContainer" class="events-grid"></div>
    <p id="emptyMsg" class="empty-msg" style="display:none;">No events found.</p>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <nav class="site-footer-links" id="footerLinksNav">
        <a href="/profile">My tickets</a>
        <a href="/events">Events</a>
        <a href="/about-us">About Us</a>
        <a href="/contact">Contact & Support</a>
      </nav>
      <div class="site-footer-social">
        <a id="footerInstagramLink" href="https://www.instagram.com/blockagency.eg" target="_blank" rel="noopener" class="site-footer-instagram" aria-label="Instagram">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
          <span id="footerInstagramLabel">Instagram</span>
        </a>
        <span class="site-footer-copy" id="footerCopyright">© BLOCK</span>
      </div>
    </div>
  </footer>

  <script>
    const container = document.getElementById('eventsContainer');
    const countEl = document.getElementById('eventsCount');
    const emptyMsg = document.getElementById('emptyMsg');
    const searchInput = document.getElementById('searchInput');
    const filterDate = document.getElementById('filterDate');
    const filterVenue = document.getElementById('filterVenue');
    const filterCategory = document.getElementById('filterCategory');
    let allEvents = [];

    function applySearchRedirect() {
      if (!searchInput) return;
      searchInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          const q = searchInput.value.trim();
          let url = '/events';
          if (q) url += '?q=' + encodeURIComponent(q);
          window.location.href = url;
        }
      });
    }

    function renderEvents(events) {
      if (!Array.isArray(events) || events.length === 0) {
        container.innerHTML = '';
        emptyMsg.style.display = 'block';
        countEl.textContent = '0 events';
        return;
      }
      emptyMsg.style.display = 'none';
      countEl.textContent = events.length + (events.length === 1 ? ' event' : ' events');
      const base = window.location.origin || 'http://localhost:3001';
      container.innerHTML = events.map(function (event) {
        return '<article class="event-card">' +
          '<img src="' + (event.image || '/block-logo.png') + '" alt="' + (event.name || '').replace(/"/g, '&quot;') + '">' +
          '<div class="event-card-body">' +
          '<h3 class="event-card-title">' + event.name + '</h3>' +
          '<div class="event-card-meta">' + event.date + (event.time ? ' | ' + event.time : '') + '</div>' +
          '<div class="event-card-venue">' + (event.venue || '') + '</div>' +
          '<a class="btn-register" href="' + base + '/event/' + encodeURIComponent(event.id) + '">Book Now</a>' +
          '</div></article>';
      }).join('');
    }

    function buildFilterOptions(events) {
      const dates = [], venues = [], categories = [];
      events.forEach(function (e) {
        if (e.date && dates.indexOf(e.date) === -1) dates.push(e.date);
        if (e.venue && venues.indexOf(e.venue) === -1) venues.push(e.venue);
        if (e.category && categories.indexOf(e.category) === -1) categories.push(e.category);
      });
      dates.sort(); venues.sort(); categories.sort();
      function addOptions(sel, list) {
        if (!sel) return;
        const firstText = sel.options[0] ? sel.options[0].text : 'All';
        const current = sel.value;
        sel.innerHTML = '<option value="">' + firstText + '</option>';
        list.forEach(function (v) {
          const opt = document.createElement('option');
          opt.value = v;
          opt.textContent = v;
          if (v === current) opt.selected = true;
          sel.appendChild(opt);
        });
      }
      addOptions(filterDate, dates);
      addOptions(filterVenue, venues);
      addOptions(filterCategory, categories);
    }

    function getFilteredEvents() {
      const dateVal = filterDate ? filterDate.value : '';
      const venueVal = filterVenue ? filterVenue.value : '';
      const categoryVal = filterCategory ? filterCategory.value : '';
      return allEvents.filter(function (e) {
        if (dateVal && e.date !== dateVal) return false;
        if (venueVal && e.venue !== venueVal) return false;
        if (categoryVal && e.category !== categoryVal) return false;
        return true;
      });
    }

    function applyFiltersAndRender() {
      const filtered = getFilteredEvents();
      renderEvents(filtered);
    }

    async function loadEvents() {
      try {
        const base = window.location.origin || 'http://localhost:3001';
        const res = await fetch(base + '/api/events');
        let events = await res.json();
        if (!Array.isArray(events)) events = [];
        const params = new URLSearchParams(window.location.search);
        const q = (params.get('q') || '').toLowerCase().trim();
        if (q) {
          if (searchInput) searchInput.value = q;
          events = events.filter(function (e) {
            return (e.name && e.name.toLowerCase().includes(q)) ||
                   (e.venue && e.venue.toLowerCase().includes(q)) ||
                   (e.description && e.description.toLowerCase().includes(q));
          });
        }
        allEvents = events;
        buildFilterOptions(events);
        if (filterDate) filterDate.value = params.get('date') || '';
        if (filterVenue) filterVenue.value = params.get('venue') || '';
        if (filterCategory) filterCategory.value = params.get('category') || '';
        applyFiltersAndRender();

        [document.getElementById('applyDate'), document.getElementById('applyVenue'), document.getElementById('applyCategory')].forEach(function (btn) {
          if (btn) btn.addEventListener('click', applyFiltersAndRender);
        });
        [filterDate, filterVenue, filterCategory].forEach(function (sel) {
          if (sel) sel.addEventListener('change', applyFiltersAndRender);
        });
      } catch (e) {
        emptyMsg.textContent = 'Could not load events. Try again later.';
        emptyMsg.style.display = 'block';
      }
    }

    applySearchRedirect();
    loadEvents();

    (function loadFooterConfig() {
      fetch('/api/site-config').then(function(r){ return r.json(); }).then(function(cfg){
        var copy = document.getElementById('footerCopyright');
        var igLink = document.getElementById('footerInstagramLink');
        var igLabel = document.getElementById('footerInstagramLabel');
        var nav = document.getElementById('footerLinksNav');
        if (copy) copy.textContent = cfg.copyright || '© BLOCK';
        if (igLink) igLink.href = cfg.instagramUrl || 'https://www.instagram.com/blockagency.eg';
        if (igLabel) igLabel.textContent = cfg.instagramLabel || 'Instagram';
        if (nav && Array.isArray(cfg.links) && cfg.links.length) {
          nav.innerHTML = cfg.links.map(function(l){ return '<a href="' + (l.url||'#') + '">' + (l.label||'') + '</a>'; }).join('');
        }
      }).catch(function(){});
    })();
  </script>
</body>
</html>
