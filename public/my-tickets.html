<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My tickets – BLOCK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <script>
    (function() {
      var isFile = location.protocol === 'file:';
      var isWrongPort = location.hostname === 'localhost' && location.port !== '3001' && location.port !== '';
      if (isFile || isWrongPort) {
        var base = document.createElement('base');
        base.href = 'http://localhost:3001/';
        document.head.appendChild(base);
      }
    })();
  </script>
  <style>
    :root {
      --bg: #0a0a0c;
      --card: #1a1a1f;
      --border: #2d2d35;
      --text: #e8e8ed;
      --muted: #8888a0;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #22c55e;
      --gold: #c9a227;
      --bar-bg: #ffffff;
      --bar-text: #1a1a1a;
      --bar-muted: #5a5a5a;
      --search-bg: #f0f0f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; width: 100%; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.15), transparent);
    }
    .top-bar-wrap { width: 100%; padding: 1rem clamp(0.75rem, 3vw, 1.25rem) 0; margin-bottom: 1rem; }
    .top-bar {
      width: 100%;
      max-width: min(1400px, 96vw);
      margin: 0 auto;
      background: var(--bar-bg);
      border-radius: 16px;
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .top-bar .logo { width: 110px; height: auto; flex-shrink: 0; }
    .search-wrap { flex: 1; min-width: 180px; max-width: 360px; position: relative; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--bar-muted); }
    .search-wrap input {
      width: 100%;
      padding: 10px 12px 10px 40px;
      font: inherit;
      font-size: 0.95rem;
      color: var(--bar-text);
      background: var(--search-bg);
      border: none;
      border-radius: 12px;
    }
    .search-wrap input::placeholder { color: var(--bar-muted); }
    .search-wrap input:focus { outline: none; }
    .top-bar-nav { display: flex; align-items: center; gap: 1.25rem; flex-wrap: wrap; margin-left: auto; }
    .top-bar-nav a { color: var(--bar-text); text-decoration: none; font-size: 0.95rem; font-weight: 500; }
    .top-bar-nav a:hover { color: var(--accent); }
    .top-bar-icons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    .top-bar-icons a, .top-bar-icons button {
      display: flex; align-items: center; justify-content: center;
      width: clamp(36px, 9vw, 40px); height: clamp(36px, 9vw, 40px);
      min-width: 36px; min-height: 36px;
      border: none; background: transparent;
      color: var(--bar-text); cursor: pointer; border-radius: 10px; text-decoration: none;
    }
    .top-bar-icons a:hover, .top-bar-icons button:hover { background: var(--search-bg); color: var(--accent); }
    .top-bar-icons svg { width: clamp(18px, 4.5vw, 20px); height: clamp(18px, 4.5vw, 20px); }
    @media (max-width: 600px) {
      .top-bar { padding: 0.6rem 1rem; gap: 0.6rem; }
      .top-bar .logo { width: 90px; }
      .search-wrap { flex: 1 1 100%; min-width: 100%; max-width: 100%; order: 1; }
      .top-bar-nav { order: 2; flex: 1 1 100%; margin-left: 0; gap: 0.75rem; font-size: 0.85rem; }
      .top-bar-nav a { font-size: 0.85rem; white-space: nowrap; }
      .top-bar-icons { order: 0; margin-left: auto; }
    }

    .page-main {
      flex: 1;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem clamp(0.75rem, 3vw, 1.25rem);
    }
    .page-main h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .page-main .subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 1.5rem; }
    .email-form {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .email-form input {
      flex: 1;
      min-width: min(200px, 100%);
      padding: 12px 14px;
      font: inherit;
      font-size: 1rem;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .email-form input:focus { outline: none; border-color: var(--accent); }
    .email-form input::placeholder { color: var(--muted); }
    .btn-show {
      padding: 12px 20px;
      font: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a1a;
      background: var(--gold);
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .btn-show:hover { background: #d4af37; }
    .ticket-list { display: flex; flex-direction: column; gap: 1rem; }
    .ticket-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
    }
    .ticket-card h3 { font-size: 1.1rem; margin-bottom: 0.35rem; }
    .ticket-card .meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 0.75rem; }
    .ticket-card .status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .ticket-card .status.attended { background: rgba(34, 197, 94, 0.35); color: #22c55e; font-weight: 600; }
    .ticket-card .status.not-attended { background: rgba(136, 136, 160, 0.2); color: var(--muted); }
    .ticket-card .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .ticket-card .actions a,
    .ticket-card .actions button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      border: none;
    }
    .btn-view {
      color: white;
      background: var(--accent);
    }
    .btn-view:hover { background: var(--accent-hover); }
    .btn-resend {
      color: #1a1a1a;
      background: var(--gold);
    }
    .btn-resend:hover { background: #d4af37; }
    .btn-resend:disabled { opacity: 0.6; cursor: not-allowed; }
    .empty-msg { color: var(--muted); text-align: center; padding: 2rem; }
    .message { padding: 12px; border-radius: 10px; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
    .message.show { display: block; }
    .message.error { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    .message.success { background: rgba(34, 197, 94, 0.15); color: var(--success); }

    .profile-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .profile-card h2 { font-size: 1.15rem; margin-bottom: 1rem; }
    .profile-card .field { margin-bottom: 1rem; }
    .profile-card .field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .profile-card .field-value {
      font-size: 0.98rem;
      color: var(--text);
    }

    .site-footer { margin-top: auto; padding: 2.5rem 1.25rem; border-top: 1px solid var(--border); background: linear-gradient(180deg, rgba(20,20,24,0.6), var(--card)); }
    .site-footer-inner { max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1.75rem; }
    .site-footer-links { display: flex; flex-wrap: wrap; align-items: center; gap: 1.5rem; }
    .site-footer-links a { color: var(--muted); text-decoration: none; font-size: 0.95rem; font-weight: 500; }
    .site-footer-links a:hover { color: var(--accent); }
    .site-footer-social { display: flex; align-items: center; gap: 1rem; }
    .site-footer-instagram { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--muted); text-decoration: none; font-size: 0.95rem; font-weight: 500; padding: 0.4rem 0.75rem; border-radius: 10px; transition: color 0.2s, background 0.2s; }
    .site-footer-instagram:hover { color: var(--accent); background: rgba(99,102,241,0.08); }
    .site-footer-instagram svg { width: 20px; height: 20px; }
    .site-footer-copy { color: var(--muted); font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="top-bar-wrap">
    <header class="top-bar">
      <a href="/"><img src="/block-logo.png" alt="BLOCK" class="logo"></a>
      <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input type="search" id="searchInput" placeholder="Search for events..." aria-label="Search events">
      </div>
      <nav class="top-bar-nav">
        <a href="/events">Events</a>
        <a href="/about-us">About Us</a>
        <a href="/contact">Contact & Support</a>
      </nav>
      <div class="top-bar-icons">
        <a href="/my-tickets"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></a>
      </div>
    </header>
  </div>

  <main class="page-main">
    <h1>My tickets</h1>
    <p class="subtitle">Enter the email you used to register to see your events and ticket status.</p>

    <form id="emailForm" class="email-form">
      <input type="email" id="emailInput" placeholder="Your email" required>
      <button type="submit" class="btn-show" id="btnShow">Show my tickets</button>
    </form>

    <div id="message" class="message"></div>

    <section id="profileSection" class="profile-card" style="display: none;">
      <h2>Your profile</h2>
      <p class="subtitle" style="margin-bottom: 1rem;">Info you entered when you registered.</p>
      <div class="field">
        <label>Name</label>
        <p id="profileNameText" class="field-value"></p>
      </div>
      <div class="field">
        <label>Email (registered)</label>
        <p id="profileEmailText" class="field-value"></p>
      </div>
      <div class="field">
        <label>Phone</label>
        <p id="profilePhoneText" class="field-value"></p>
      </div>
    </section>

    <div id="ticketList" class="ticket-list"></div>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <nav class="site-footer-links" id="footerLinksNav">
        <a href="/my-tickets">My tickets</a>
        <a href="/events">Events</a>
        <a href="/about-us">About Us</a>
        <a href="/contact">Contact & Support</a>
      </nav>
      <div class="site-footer-social">
        <a id="footerInstagramLink" href="https://www.instagram.com/blockagency.eg" target="_blank" rel="noopener" class="site-footer-instagram" aria-label="Instagram">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
          <span id="footerInstagramLabel">Instagram</span>
        </a>
        <span class="site-footer-copy" id="footerCopyright">© BLOCK</span>
      </div>
    </div>
  </footer>

  <script>
    var emailForm = document.getElementById('emailForm');
    var emailInput = document.getElementById('emailInput');
    var btnShow = document.getElementById('btnShow');
    var ticketList = document.getElementById('ticketList');
    var message = document.getElementById('message');
    var profileSection = document.getElementById('profileSection');
    var profileNameText = document.getElementById('profileNameText');
    var profileEmailText = document.getElementById('profileEmailText');
    var profilePhoneText = document.getElementById('profilePhoneText');
    var base = window.location.origin || 'http://localhost:3001';

    function showMsg(text, type) {
      message.textContent = text;
      message.className = 'message show ' + (type || '');
    }

    function formatDate(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    emailForm.addEventListener('submit', async function (e) {
      e.preventDefault();
      var email = emailInput.value.trim();
      if (!email) return;
      btnShow.disabled = true;
      btnShow.textContent = 'Loading…';
      ticketList.innerHTML = '';
      profileSection.style.display = 'none';
      showMsg('');
      try {
        var res = await fetch(base + '/api/my-tickets?email=' + encodeURIComponent(email));
        var data = await res.json();
        if (!Array.isArray(data)) data = [];
        if (data.length === 0) {
          ticketList.innerHTML = '<p class="empty-msg">No registrations found for this email. Book an event first.</p>';
        } else {
          var first = data[0];
          profileNameText.textContent = first.name || '—';
          profileEmailText.textContent = first.email || '—';
          profilePhoneText.textContent = first.phone || '—';
          profileSection.style.display = 'block';
          ticketList.innerHTML = data.map(function (row) {
            var attended = row.attended === true;
            var statusClass = attended ? 'attended' : 'not-attended';
            var statusText = attended ? 'Attended ✓' : 'Not attended yet';
            var checkin = attended && row.checkin_time ? ' (Checked in ' + formatDate(row.checkin_time) + ')' : '';
            return '<div class="ticket-card">' +
              '<h3>' + (row.event_name || 'Event') + '</h3>' +
              '<p class="meta">Registered ' + formatDate(row.created_at) + '</p>' +
              '<span class="status ' + statusClass + '">' + statusText + checkin + '</span>' +
              '<div class="actions">' +
              '<a href="' + base + '/ticket/' + encodeURIComponent(row.ticket_id) + '" target="_blank" class="btn-view">View ticket / QR</a>' +
              '<button type="button" class="btn-resend" data-email="' + email.replace(/"/g, '&quot;') + '" data-ticket="' + (row.ticket_id || '').replace(/"/g, '&quot;') + '">Resend QR to my email</button>' +
              '</div></div>';
          }).join('');
          ticketList.querySelectorAll('.btn-resend').forEach(function (btn) {
            btn.addEventListener('click', function () {
              var em = btn.getAttribute('data-email');
              var tk = btn.getAttribute('data-ticket');
              if (!em || !tk) return;
              btn.disabled = true;
              fetch(base + '/api/resend-ticket', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: em, ticketId: tk })
              }).then(function (r) { return r.json(); }).then(function (d) {
                if (d.error) showMsg(d.error, 'error'); else showMsg('Ticket sent to your email.', 'success');
                btn.disabled = false;
              }).catch(function () {
                showMsg('Request failed.', 'error');
                btn.disabled = false;
              });
            });
          });
        }
      } catch (err) {
        ticketList.innerHTML = '<p class="empty-msg">Could not load tickets. Try again.</p>';
      }
      btnShow.disabled = false;
      btnShow.textContent = 'Show my tickets';
    });

    // Auto-fill and fetch when arriving from ticket page (e.g. ?email=xxx)
    var params = new URLSearchParams(window.location.search);
    var prefilled = params.get('email');
    if (prefilled) {
      emailInput.value = prefilled;
      emailForm.dispatchEvent(new Event('submit'));
    }

    (function loadFooterConfig() {
      fetch('/api/site-config').then(function(r){ return r.json(); }).then(function(cfg){
        var copy = document.getElementById('footerCopyright');
        var igLink = document.getElementById('footerInstagramLink');
        var igLabel = document.getElementById('footerInstagramLabel');
        var nav = document.getElementById('footerLinksNav');
        if (copy) copy.textContent = cfg.copyright || '© BLOCK';
        if (igLink) igLink.href = cfg.instagramUrl || 'https://www.instagram.com/blockagency.eg';
        if (igLabel) igLabel.textContent = cfg.instagramLabel || 'Instagram';
        if (nav && Array.isArray(cfg.links) && cfg.links.length) {
          nav.innerHTML = cfg.links.map(function(l){ return '<a href="' + (l.url||'#') + '">' + (l.label||'') + '</a>'; }).join('');
        }
      }).catch(function(){});
    })();
  </script>
</body>
</html>
