<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Scanner – BLOCK Events</title>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"
    onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';document.head.appendChild(s);"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; width: 100%; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f12;
      color: #e8e8ed;
      min-height: 100vh;
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden;
      padding: clamp(0.5rem, 2vw, 1rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .logo { width: 90px; height: auto; margin-bottom: 0.75rem; filter: brightness(2.4); }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .sub { color: #8888a0; font-size: 0.9rem; margin-bottom: 1rem; }
    #qr-reader { border-radius: 12px; overflow: hidden; max-width: 100%; }
    #qr-reader__scan_region { background: #1a1a1e; }
    #result {
      margin-top: 1rem;
      padding: 1rem 1.25rem;
      border-radius: 10px;
      font-weight: 600;
      min-height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 320px;
      width: 100%;
    }
    #result.success { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    #result.already { background: rgba(234, 179, 8, 0.2); color: #eab308; }
    #result.error { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    #result:empty { display: none; }
    .manual {
      margin-top: 1.5rem;
      width: 100%;
      max-width: 320px;
    }
    .manual label { display: block; text-align: left; font-size: 0.85rem; color: #8888a0; margin-bottom: 0.35rem; }
    .manual-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .manual-row input {
      flex: 1;
      padding: 0.6rem 0.75rem;
      border: 1px solid #25252d;
      border-radius: 8px;
      background: #141418;
      color: #e8e8ed;
      font-size: 1rem;
    }
    .manual-row button {
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .manual-row button:hover { background: #818cf8; }
    .camera-placeholder {
      width: 100%;
      max-width: 320px;
      min-height: 260px;
      background: #1a1a1e;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      border: 2px dashed #25252d;
    }
    .camera-placeholder p { color: #8888a0; margin-bottom: 1rem; }
    .btn-camera {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-camera:hover { background: #818cf8; }
    .btn-camera:disabled { opacity: 0.7; cursor: not-allowed; }

    /* Server-side history is blur-hidden; eye reveals it for 10 seconds. */
    #history.blurred { filter: blur(7px); opacity: 0.35; }
  </style>
</head>
<body>
  <img src="/block-logo.png" alt="BLOCK" class="logo">
  <h1>Ticket Scanner</h1>
  <p class="sub">Point the camera at the attendee’s QR code</p>
  <div id="cameraPlaceholder" class="camera-placeholder">
    <p>Camera access is required to scan QR codes.<br>Click the button below to start.</p>
    <button type="button" class="btn-camera" id="btnStartCamera">Start camera</button>
  </div>
  <div id="qr-reader" style="width: 100%; max-width: 320px; display: none;"></div>
  <div id="result"></div>
  <div id="ticketInfo" style="display:none; width:100%; max-width:320px; margin-top:0.75rem; border:1px solid #25252d; border-radius:12px; background:#141418; padding:0.85rem 1rem; text-align:left;">
    <div id="ticketHeader" style="display:flex; align-items:center; gap:0.6rem; margin-bottom:0.6rem;">
      <div id="statusIcon" style="width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;"></div>
      <div>
        <div id="statusTitle" style="font-weight:800;">—</div>
        <div id="statusSub" style="color:#8888a0;font-size:0.85rem;">—</div>
      </div>
    </div>
    <div style="color:#8888a0;font-size:0.85rem;margin-bottom:0.2rem;">Event</div>
    <div id="infoEvent" style="font-weight:700;margin-bottom:0.6rem;">—</div>
    <div style="color:#8888a0;font-size:0.85rem;margin-bottom:0.2rem;">User</div>
    <div id="infoUser" style="font-weight:700;margin-bottom:0.6rem;">—</div>
    <div style="color:#8888a0;font-size:0.85rem;margin-bottom:0.2rem;">Ticket</div>
    <div id="infoTicket" style="font-weight:900;letter-spacing:0.04em;">—</div>
  </div>
  <div class="manual">
    <label for="ticketIdInput">Or enter ticket ID manually</label>
    <div class="manual-row">
      <input type="text" id="ticketIdInput" placeholder="Ticket ID" autocomplete="off">
      <button type="button" id="btnCheckIn">Check in</button>
    </div>
  </div>
  <div style="width:100%; max-width:320px; margin-top:1rem; text-align:left;">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:0.75rem;">
      <div style="font-weight:700;">Scan history</div>
        <button id="btnRevealHistory" type="button" style="background:transparent;border:1px solid #25252d;color:#e8e8ed;border-radius:10px;padding:8px 10px;cursor:pointer; display:none;">👁</button>
    </div>
    <div id="history" style="margin-top:0.6rem; display:flex; flex-direction:column; gap:0.5rem;" class="blurred"></div>
  </div>

  <script>
    function getTicketIdFromDecoded(text) {
      if (!text || typeof text !== 'string') return null;
      var t = text.trim();
      var match = t.match(/\/checkin\/([^/?\s]+)/);
      if (match) return match[1];
      if (/^[a-zA-Z0-9_-]+$/.test(t)) return t;
      return null;
    }

    function setResult(msg, type) {
      var el = document.getElementById('result');
      if (el) { el.textContent = msg; el.className = type || ''; }
    }

    function beep(ok) {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var o = ctx.createOscillator();
        var g = ctx.createGain();
        o.type = 'sine';
        o.frequency.value = ok ? 880 : 220;
        g.gain.value = 0.05;
        o.connect(g);
        g.connect(ctx.destination);
        o.start();
        setTimeout(function(){ o.stop(); ctx.close(); }, ok ? 120 : 220);
      } catch (e) {}
    }

    function haptic(ok) {
      try {
        if (navigator.vibrate) navigator.vibrate(ok ? [40] : [120, 60, 120]);
      } catch (e) {}
    }

    function renderTicketState(payload) {
      var wrap = document.getElementById('ticketInfo');
      var icon = document.getElementById('statusIcon');
      var title = document.getElementById('statusTitle');
      var sub = document.getElementById('statusSub');
      var e = document.getElementById('infoEvent');
      var u = document.getElementById('infoUser');
      var t = document.getElementById('infoTicket');
      if (!wrap || !icon || !title || !sub || !e || !u || !t) return;

      var status = payload.status;
      var ticket = payload.ticket || {};
      wrap.style.display = 'block';

      if (status === 'success') {
        icon.textContent = '✓';
        icon.style.background = 'rgba(34,197,94,0.2)';
        icon.style.color = '#22c55e';
        title.textContent = 'Scan Successful';
        sub.textContent = ticket.usedAt ? ('Used at ' + new Date(ticket.usedAt).toLocaleString()) : '';
      } else if (status === 'already_used') {
        icon.textContent = '✕';
        icon.style.background = 'rgba(239,68,68,0.18)';
        icon.style.color = '#ef4444';
        title.textContent = 'Ticket already scanned';
        sub.textContent = ticket.usedAt ? ('Used at ' + new Date(ticket.usedAt).toLocaleString()) : '';
      } else {
        icon.textContent = '!';
        icon.style.background = 'rgba(239,68,68,0.18)';
        icon.style.color = '#ef4444';
        title.textContent = 'Invalid ticket';
        sub.textContent = payload.message || '';
      }

      e.textContent = ticket.eventName || '—';
      u.textContent = (ticket.userName || '—') + (ticket.userEmail ? (' • ' + ticket.userEmail) : '');
      var parts = [];
      if (ticket.ticketNumber != null && ticket.ticketNumber !== '') parts.push('Ticket #' + ticket.ticketNumber);
      if (ticket.ticket_id) parts.push(ticket.ticket_id);
      if (ticket.ticketCategory) parts.push('(' + ticket.ticketCategory + ')');
      t.textContent = parts.join(' ');
    }

    var historyEl = document.getElementById('history');
    var btnRevealHistory = document.getElementById('btnRevealHistory');
    var historyTimer = null;
    var pingTimer = null;

    function ensureScannerPing() {
      if (pingTimer) return;
      // Keep the scanner "online" status updated every 15 seconds.
      try {
        pingTimer = setInterval(function () {
          fetch('/api/scanner/ping', { method: 'POST' }).catch(function () {});
        }, 15000);
        fetch('/api/scanner/ping', { method: 'POST' }).catch(function () {});
      } catch (e) {}
    }

    function setHistoryBlurred(blurred) {
      if (!historyEl) return;
      if (blurred) historyEl.classList.add('blurred');
      else historyEl.classList.remove('blurred');
      if (btnRevealHistory) btnRevealHistory.style.display = blurred ? 'block' : 'none';
    }

    function renderHistoryFromLogs(logs) {
      if (!historyEl) return;
      if (!Array.isArray(logs) || !logs.length) {
        historyEl.innerHTML = '<div style="color:#8888a0; font-size:0.9rem;">No scans yet.</div>';
        return;
      }
      historyEl.innerHTML = logs.map(function (x) {
        var color = x.status === 'success' ? '#22c55e' : x.status === 'already_used' ? '#ef4444' : '#ef4444';
        return '<div style="border:1px solid #25252d; border-radius:12px; padding:10px 12px; background:#141418;">' +
          '<div style="display:flex; justify-content:space-between; gap:0.75rem; align-items:center;">' +
            '<div style="font-weight:800; color:' + color + ';">' + x.status.toUpperCase().replace('_',' ') + '</div>' +
            '<div style="color:#8888a0; font-size:0.85rem;">' + new Date(x.at).toLocaleTimeString() + '</div>' +
          '</div>' +
          '<div style="margin-top:0.25rem; font-weight:700;">' + (x.eventName || '—') + '</div>' +
          '<div style="color:#8888a0; font-size:0.85rem; margin-top:0.15rem;">' + (x.userName || '—') + ' • ' + (x.ticketNumber != null ? ('#' + x.ticketNumber + ' ') : '') + (x.ticketId || '') + '</div>' +
        '</div>';
      }).join('');
    }

    function getScannerIdFromLocation() {
      try {
        var parts = (location.pathname || '').split('/').filter(Boolean);
        if (parts[0] === 'scan' && parts[1]) return decodeURIComponent(parts[1]);
        var params = new URLSearchParams(location.search || '');
        return params.get('scannerId') || '';
      } catch (e) {}
      return '';
    }

    function getDeviceId() {
      var key = 'scanner_device_id_v1';
      try {
        var id = localStorage.getItem(key);
        if (id) return id;
      } catch (e) {}
      var newId = null;
      try {
        if (window.crypto && window.crypto.randomUUID) newId = window.crypto.randomUUID();
      } catch (e) {}
      if (!newId) newId = 'device_' + Math.random().toString(16).slice(2);
      try { localStorage.setItem(key, newId); } catch (e) {}
      return newId;
    }

    async function loadHistoryFromServer() {
      var limit = 25;
      var r = await fetch('/api/scanner/history?limit=' + encodeURIComponent(limit)).catch(() => null);
      if (!r) throw new Error('Could not load scanner history.');
      if (r.status === 401) throw new Error('Unauthorized');
      var d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d.error || 'Could not load history.');
      return Array.isArray(d.logs) ? d.logs : [];
    }

    async function revealHistoryForTenSeconds() {
      // Always show history for 10 seconds after the latest scan.
      ensureScannerPing();
      setHistoryBlurred(false);
      try {
        var logs = await loadHistoryFromServer();
        // Convert response shape to what renderHistoryFromLogs expects.
        var normalized = logs.map(function (x) {
          return {
            at: x.at,
            status: x.status,
            ticketId: x.ticketId,
            eventName: x.eventName,
            userName: x.userName,
            ticketNumber: x.ticketNumber,
          };
        });
        renderHistoryFromLogs(normalized);
      } catch (e) {
        var txt = String(e.message || 'History error');
        historyEl.innerHTML = '<div style="color:#fecaca; font-size:0.9rem;">' + txt + '</div>';
      }

      if (historyTimer) clearTimeout(historyTimer);
      historyTimer = setTimeout(function () {
        setHistoryBlurred(true);
      }, 10000);
    }

    // Temporary fallback mode: if scannerId is missing, keep old behavior with SCANNER_API_KEY + localStorage history.
    var LOCAL_HISTORY_KEY = 'scan_history_v1';
    function pushLocalHistory(entry) {
      try {
        var arr = JSON.parse(localStorage.getItem(LOCAL_HISTORY_KEY) || '[]');
        arr.unshift(entry);
        arr = arr.slice(0, 25);
        localStorage.setItem(LOCAL_HISTORY_KEY, JSON.stringify(arr));
        renderHistoryFromLogs(arr);
      } catch (e) {}
    }

    async function doScan(ticketId, fromScan) {
      try {
        var scannerId = getScannerIdFromLocation();
        if (!scannerId) {
          // Backward compatible mode: old single SCANNER_API_KEY protection.
          var scannerKey = '';
          try { scannerKey = localStorage.getItem('scanner_key') || ''; } catch (e) {}

          var r0 = await fetch('/api/scan-ticket', {
            method: 'POST',
            headers: Object.assign(
              { 'Content-Type': 'application/json' },
              scannerKey ? { 'X-Scanner-Key': scannerKey } : {}
            ),
            body: JSON.stringify({ ticket_id: ticketId })
          });

          var data0 = await r0.json().catch(() => ({}));

          if (r0.status === 401) {
            var k = prompt('Scanner key required (staff only). Enter SCANNER_API_KEY:');
            if (k) {
              try { localStorage.setItem('scanner_key', k.trim()); } catch (e) {}
              return doScan(ticketId, fromScan);
            }
            setResult('Unauthorized', 'error');
            return;
          }

          if (data0.status === 'success') {
            setResult('Scan Successful', 'success');
            beep(true); haptic(true);
          } else if (data0.status === 'already_used') {
            setResult('Ticket already scanned', 'error');
            beep(false); haptic(false);
          } else {
            setResult('Invalid ticket', 'error');
            beep(false); haptic(false);
          }

          renderTicketState(data0);

          // Local history (fallback mode only)
          setHistoryBlurred(false);
          pushLocalHistory({
            at: Date.now(),
            status: data0.status || 'invalid',
            ticketId: (data0.ticket && data0.ticket.ticket_id) || ticketId,
            ticketNumber: data0.ticket && data0.ticket.ticketNumber,
            eventName: data0.ticket && data0.ticket.eventName,
            userName: data0.ticket && data0.ticket.userName
          });
          if (historyTimer) clearTimeout(historyTimer);
          historyTimer = setTimeout(function () { setHistoryBlurred(true); }, 10000);

          if (fromScan && window.html5QrCode) {
            setTimeout(function () { setResult(''); window.html5QrCode.resume(); }, 1800);
          }
          return;
        }

        var deviceId = getDeviceId();

        var r = await fetch('/api/scanner/scan-ticket', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ticket_id: ticketId })
        });

        var data = await r.json().catch(() => ({}));

        if (r.status === 401) {
          var password = prompt('Scanner password required (enter it once).');
          if (!password) {
            setResult('Unauthorized', 'error');
            return;
          }

          var loginRes = await fetch('/api/scanner/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ scannerId: scannerId, password: password, deviceId: deviceId })
          }).catch(() => null);

          if (!loginRes || !loginRes.ok) {
            setResult('Login failed', 'error');
            return;
          }
          return doScan(ticketId, fromScan);
        }

        if (data.status === 'success') {
          setResult('Scan Successful', 'success');
          beep(true); haptic(true);
        } else if (data.status === 'already_used') {
          setResult('Ticket already scanned', 'error');
          beep(false); haptic(false);
        } else {
          setResult('Invalid ticket', 'error');
          beep(false); haptic(false);
        }

        renderTicketState(data);
        await revealHistoryForTenSeconds();

        if (fromScan && window.html5QrCode) {
          setTimeout(function () { setResult(''); window.html5QrCode.resume(); }, 1800);
        }
      } catch (e) {
        setResult('Network error', 'error');
        beep(false); haptic(false);
        if (fromScan && window.html5QrCode) window.html5QrCode.resume();
      }
    }

    var html5QrCode = null;

    function startCamera() {
      var placeholder = document.getElementById('cameraPlaceholder');
      var qrReader = document.getElementById('qr-reader');
      var btn = document.getElementById('btnStartCamera');
      if (!placeholder || !qrReader || !btn) return;
      btn.disabled = true;
      btn.textContent = 'Starting…';
      setResult('');

      try {
        if (typeof Html5Qrcode === 'undefined') {
          setResult('Scanner library failed to load. Check your connection and refresh.', 'error');
          btn.disabled = false;
          btn.textContent = 'Retry';
          return;
        }
        placeholder.style.display = 'none';
        qrReader.style.display = 'block';
        if (!html5QrCode) html5QrCode = new Html5Qrcode('qr-reader');
        window.html5QrCode = html5QrCode;
        var config = { fps: 10, qrbox: { width: 220, height: 220 } };
        Html5Qrcode.getCameras().then(function(cameras) {
          if (!cameras || !cameras.length) {
            setResult('No camera found.', 'error');
            btn.disabled = false;
            btn.textContent = 'Retry';
            placeholder.style.display = 'flex';
            qrReader.style.display = 'none';
            return;
          }
          var back = cameras.find(function(c) { return (c.label || '').toLowerCase().indexOf('back') !== -1; });
          var camId = back ? back.id : cameras[0].id;
          return html5QrCode.start(camId, config, function(decodedText) {
            var ticketId = getTicketIdFromDecoded(decodedText);
            if (!ticketId) return;
            html5QrCode.pause();
            doScan(ticketId, true);
          }, function() {});
        }).then(function() {
          btn.style.display = 'none';
        }).catch(function(err) {
          setResult('Camera blocked or unavailable. Allow access and try again.', 'error');
          btn.disabled = false;
          btn.textContent = 'Retry';
          placeholder.style.display = 'flex';
          qrReader.style.display = 'none';
        });
      } catch (err) {
        setResult('Error: ' + (err.message || 'Failed to start scanner.'), 'error');
        btn.disabled = false;
        btn.textContent = 'Retry';
      }
    }

    document.getElementById('btnStartCamera').addEventListener('click', startCamera);
    document.getElementById('btnCheckIn').addEventListener('click', function() {
      var input = document.getElementById('ticketIdInput');
      var ticketId = (input && input.value || '').trim();
      if (!ticketId) { setResult('Enter a ticket ID', 'error'); return; }
      doScan(ticketId, false);
    });
    document.getElementById('ticketIdInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('btnCheckIn').click();
    });

    if (btnRevealHistory) {
      btnRevealHistory.addEventListener('click', function () {
        revealHistoryForTenSeconds();
      });
    }
    setHistoryBlurred(true);

    // If scanner is already logged in (session cookie exists), mark them online immediately.
    (async function initScannerOnline() {
      try {
        var r = await fetch('/api/scanner/me', { method: 'GET' }).catch(function () { return null; });
        if (r && r.ok) {
          ensureScannerPing();
        }
      } catch (e) {}
    })();
  </script>
</body>
</html>
