<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Details – BLOCK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a0c; --card:#141418; --border:#25252d; --text:#e8e8ed; --muted:#8888a0;
      --accent:#6366f1; --accent-hover:#818cf8; --danger:#ef4444;
      --shadow:0 10px 30px rgba(0,0,0,0.35);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Outfit',system-ui,sans-serif;
      background:var(--bg); color:var(--text);
      min-height:100vh; display:flex; flex-direction:column;
      background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.15), transparent);
    }
    .top-bar-wrap{width:100%; padding:1rem clamp(0.75rem,3vw,1.25rem) 0; margin-bottom:1rem;}
    .top-bar{
      width:100%; max-width:min(1400px,96vw); margin:0 auto;
      background:#fff; border-radius:16px; padding:0.75rem 1.25rem;
      display:flex; align-items:center; gap:1rem; flex-wrap:wrap;
      box-shadow:0 4px 20px rgba(0,0,0,0.08);
    }
    .logo{width:110px; height:auto;}
    .nav{margin-left:auto; display:flex; gap:1rem; flex-wrap:wrap;}
    .nav a{color:#1a1a1a; text-decoration:none; font-weight:800; font-size:0.95rem;}
    .nav a:hover{color:var(--accent);}
    .main{flex:1; width:100%; max-width:1100px; margin:0 auto; padding:1.25rem;}
    h1{font-size:1.8rem; margin:0.2rem 0 0.5rem;}
    .sub{color:var(--muted); margin-bottom:1.25rem;}
    .grid{display:grid; grid-template-columns: 1fr 0.92fr; gap:1rem; align-items:start;}
    @media (max-width: 920px){ .grid{grid-template-columns:1fr;} }
    .card{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:1.25rem;}
    .hero{
      position:relative; overflow:hidden;
      border-radius:20px; border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(99,102,241,0.16), rgba(0,0,0,0));
      min-height:190px;
    }
    .hero img{
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:cover; opacity:0.28;
    }
    .hero .hero-inner{position:relative; padding:1.2rem;}
    .section-title{font-weight:1000; font-size:1.05rem; margin-bottom:0.6rem;}
    .facilities{display:flex; flex-wrap:wrap; gap:8px;}
    .chip{border:1px solid var(--border); background:#0f0f12; padding:8px 10px; border-radius:999px; color:var(--muted); font-weight:800; font-size:0.88rem;}
    .ticketList{display:flex; flex-direction:column; gap:0.75rem;}
    .ticketCard{
      border:1px solid var(--border);
      background:#0f0f12;
      border-radius:16px;
      padding:14px 14px;
      display:flex; gap:0.85rem; align-items:flex-start; justify-content:space-between;
    }
    .ticketTitle{font-weight:1000;}
    .meta{color:var(--muted); font-size:0.92rem;}
    .btn{
      padding:12px 14px; border-radius:12px;
      border:none; background:var(--accent); color:white;
      font:inherit; font-weight:1000; cursor:pointer;
    }
    .btn:hover{background:var(--accent-hover);}
    .btn.secondary{background:transparent; border:1px solid var(--border); color:var(--text);}
    .btn.secondary:hover{background:rgba(255,255,255,0.04);}
    .btn:disabled{opacity:.7; cursor:not-allowed;}

    .modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:60; display:none; align-items:center; justify-content:center; padding:18px;}
    .modal-overlay.show{display:flex;}
    .modal-card{width:100%; max-width:560px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px 18px; box-shadow:var(--shadow);}
    .counterRow{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:1rem;}
    .counter{
      display:flex; align-items:center; gap:10px;
      border:1px solid var(--border); border-radius:14px; padding:10px 12px; background:#0f0f12;
    }
    .counter button{
      width:36px; height:36px; border-radius:12px;
      border:1px solid var(--border); background:transparent; color:var(--text); font-weight:1000; cursor:pointer;
    }
    .counter button:hover{background:rgba(255,255,255,0.04);}
    .counter .qty{min-width:48px; text-align:center; font-weight:1000; font-size:1.05rem;}
  </style>
</head>
<body>
  <div class="top-bar-wrap">
    <header class="top-bar">
      <a href="/"><img src="/block-logo.png" class="logo" alt="BLOCK"></a>
      <nav class="nav">
        <a href="/events">Events</a>
        <a href="/cart">Cart</a>
        <a href="/profile">Profile</a>
      </nav>
    </header>
  </div>

  <main class="main">
    <div class="hero">
      <img id="heroImg" alt="" src="/block-logo.png">
      <div class="hero-inner">
        <div class="sub" id="eventMeta">Loading…</div>
        <h1 id="eventTitle">Event</h1>
      </div>
    </div>

    <div class="grid" style="margin-top:1rem;">
      <section class="card">
        <div class="section-title">Facilities</div>
        <div id="facilities" class="facilities"></div>

        <div class="section-title" style="margin-top:1rem;">Location</div>
        <div id="locationBox" class="meta" style="margin-top:0.5rem; line-height:1.5;"></div>

        <div class="section-title" style="margin-top:1rem;">Description</div>
        <div id="eventDescription" class="meta" style="line-height:1.6;"></div>
      </section>

      <aside class="card">
        <div class="section-title">Ticket Categories</div>
        <div id="ticketList" class="ticketList"></div>
      </aside>
    </div>
  </main>

  <div id="ticketModalOverlay" class="modal-overlay">
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Select tickets">
      <div style="display:flex; justify-content:space-between; gap:12px; align-items:flex-start;">
        <div>
          <div class="meta">Selected ticket</div>
          <div id="modalTicketName" style="font-weight:1000; font-size:1.1rem; margin-top:0.15rem;">—</div>
        </div>
        <button class="btn secondary" id="btnCloseModal" type="button" style="padding:10px 12px;">Close</button>
      </div>

      <div class="counterRow">
        <div class="counter" aria-label="Quantity counter">
          <button type="button" id="btnMinus">-</button>
          <div class="qty" id="qtyVal">1</div>
          <button type="button" id="btnPlus">+</button>
        </div>
        <div style="text-align:right;">
          <div class="meta">Total</div>
          <div style="font-weight:1000; font-size:1.35rem;" id="modalTotal">—</div>
        </div>
      </div>

      <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:1.25rem; justify-content:flex-end;">
        <button class="btn" id="btnConfirmModal" type="button">Confirm</button>
      </div>

      <div id="modalMsg" class="meta" style="margin-top:0.8rem; color:var(--danger); display:none;"></div>
    </div>
  </div>

  <script>
    const heroImgEl = document.getElementById('heroImg');
    const eventTitleEl = document.getElementById('eventTitle');
    const eventMetaEl = document.getElementById('eventMeta');
    const facilitiesEl = document.getElementById('facilities');
    const locationBoxEl = document.getElementById('locationBox');
    const eventDescriptionEl = document.getElementById('eventDescription');
    const ticketListEl = document.getElementById('ticketList');

    const modalOverlayEl = document.getElementById('ticketModalOverlay');
    const modalTicketNameEl = document.getElementById('modalTicketName');
    const qtyValEl = document.getElementById('qtyVal');
    const modalTotalEl = document.getElementById('modalTotal');
    const btnConfirmModal = document.getElementById('btnConfirmModal');
    const btnCloseModal = document.getElementById('btnCloseModal');
    const modalMsgEl = document.getElementById('modalMsg');

    const btnMinus = document.getElementById('btnMinus');
    const btnPlus = document.getElementById('btnPlus');

    const escapeHtml = (s) => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    const money = (n) => {
      const v = Number(n || 0);
      if (!isFinite(v) || v <= 0) return 'FREE';
      return v.toFixed(2) + ' EGP';
    };

    function getEventIdFromPath(){
      const parts = location.pathname.split('/').filter(Boolean);
      return decodeURIComponent(parts[parts.length - 1] || '');
    }

    function showModalMsg(text){
      modalMsgEl.textContent = text || '';
      modalMsgEl.style.display = text ? 'block' : 'none';
    }

    let event = null;
    let tickets = [];

    let modalTicket = null; // {id,name,category,price}
    let modalQty = 1;

    function computeModalTotal(){
      const unit = Number(modalTicket?.price || 0);
      const total = unit * Number(modalQty || 1);
      modalTotalEl.textContent = money(total);
    }

    function openModal(ticket, qty){
      modalTicket = ticket;
      modalQty = Math.max(1, parseInt(qty || 1, 10) || 1);
      modalTicketNameEl.textContent = ticket.name;
      qtyValEl.textContent = String(modalQty);
      computeModalTotal();
      showModalMsg('');
      modalOverlayEl.classList.add('show');
    }

    function closeModal(){
      modalOverlayEl.classList.remove('show');
      showModalMsg('');
    }

    async function requireAuthOrRedirect(nextUrl){
      const me = await fetch('/api/auth/me').then(r => r.json()).catch(() => null);
      if (me && me.user) return true;
      location.href = '/auth?next=' + encodeURIComponent(nextUrl);
      return false;
    }

    async function addSelectionToCartAndCheckout(){
      if (!event || !modalTicket) return;
      const cartClearOk = await fetch('/api/cart/clear', { method:'POST' }).catch(() => null);
      if (!cartClearOk || !cartClearOk.ok) {
        // cart clear might fail if cart is already empty; fall through.
      }

      const r = await fetch('/api/cart/add-ticket', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          eventId: event.id,
          ticketId: modalTicket.id,
          ticketName: modalTicket.name,
          ticketCategory: modalTicket.category || null,
          unitPrice: modalTicket.price,
          quantity: modalQty,
        })
      });

      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d.error || 'Could not add tickets to cart.');

      location.href = '/event/checkout';
    }

    btnCloseModal.addEventListener('click', closeModal);
    modalOverlayEl.addEventListener('click', (e) => {
      if (e.target === modalOverlayEl) closeModal();
    });

    btnMinus.addEventListener('click', () => {
      modalQty = Math.max(1, modalQty - 1);
      qtyValEl.textContent = String(modalQty);
      computeModalTotal();
    });
    btnPlus.addEventListener('click', () => {
      modalQty = modalQty + 1;
      qtyValEl.textContent = String(modalQty);
      computeModalTotal();
    });

    btnConfirmModal.addEventListener('click', async () => {
      if (!modalTicket) return;
      showModalMsg('');
      btnConfirmModal.disabled = true;
      btnConfirmModal.textContent = 'Confirming…';
      try{
        const next = '/event/' + encodeURIComponent(event.id) + '?ticket=' + encodeURIComponent(modalTicket.id) + '&qty=' + encodeURIComponent(modalQty);
        const ok = await requireAuthOrRedirect(next);
        if (!ok) return;

        await addSelectionToCartAndCheckout();
      } catch (e){
        showModalMsg(e.message || 'Could not confirm.');
      } finally {
        btnConfirmModal.disabled = false;
        btnConfirmModal.textContent = 'Confirm';
      }
    });

    async function renderEventDetails(){
      const eventId = getEventIdFromPath();
      const res = await fetch('/api/booking-event/' + encodeURIComponent(eventId));
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Could not load event.');

      event = data;
      tickets = Array.isArray(data.tickets) ? data.tickets : [];

      heroImgEl.src = data.image || '/block-logo.png';
      eventTitleEl.textContent = data.name || 'Event';
      eventMetaEl.textContent = [data.date, data.time, data.venue].filter(Boolean).join(' · ') || '';

      facilitiesEl.innerHTML = (Array.isArray(data.facilities) ? data.facilities : []).slice(0, 8).map(f => '<span class="chip">' + escapeHtml(f) + '</span>').join('') || '<span class="meta">—</span>';

      locationBoxEl.innerHTML = '';
      const addr = data.location?.address || data.venue || '';
      locationBoxEl.innerHTML = '<div style="font-weight:1000;">Address</div><div class="meta" style="margin-top:0.35rem; line-height:1.5;">' + escapeHtml(addr || '—') + '</div>';

      eventDescriptionEl.textContent = data.description || '';

      if (!tickets.length) {
        ticketListEl.innerHTML = '<div class="meta">No ticket categories available.</div>';
        return;
      }

      ticketListEl.innerHTML = tickets.map(t => {
        const priceTxt = money(t.price);
        return '' +
          '<div class="ticketCard">' +
            '<div>' +
              '<div class="ticketTitle">' + escapeHtml(t.name) + '</div>' +
              '<div class="meta" style="margin-top:0.25rem;">' + (t.category ? escapeHtml(t.category) : '') + '</div>' +
            '</div>' +
            '<div style="text-align:right;">' +
              '<div style="font-weight:1000; font-size:1.15rem;">' + priceTxt + '</div>' +
              '<button class="btn" style="margin-top:0.7rem; padding:10px 12px;" type="button" data-ticket="' + escapeHtml(t.id) + '">Buy Now</button>' +
            '</div>' +
          '</div>';
      }).join('');

      ticketListEl.querySelectorAll('button[data-ticket]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const tid = btn.getAttribute('data-ticket');
          const ticket = tickets.find(t => t.id === tid);
          if (!ticket) return;

          const nextUrl = '/event/' + encodeURIComponent(event.id) + '?ticket=' + encodeURIComponent(ticket.id) + '&qty=1';
          const me = await fetch('/api/auth/me').then(r => r.json()).catch(() => null);
          if (!me || !me.user) {
            location.href = '/auth?next=' + encodeURIComponent(nextUrl);
            return;
          }

          openModal(ticket, 1);
        });
      });

      // If user came back after login/signup, auto-open modal with query params
      const params = new URLSearchParams(location.search);
      const ticketId = params.get('ticket');
      const qty = params.get('qty') || 1;
      if (ticketId) {
        const ticket = tickets.find(t => t.id === ticketId);
        if (ticket) openModal(ticket, qty);
      }
    }

    (async function init(){
      try{
        await renderEventDetails();
      } catch (e){
        eventTitleEl.textContent = 'Could not load event';
        eventMetaEl.textContent = e.message || 'Error';
      }
    })();
  </script>
</body>
</html>
